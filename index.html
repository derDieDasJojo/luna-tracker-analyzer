<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luna Tracker Analyzer</title>
    <!-- Add library for charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        textarea {
            width: 100%;
            height: 200px;
        }

        button {
            margin-top: 10px;
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
        }

        canvas {
            margin-top: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        table, th, td {
            border: 1px solid black;
        }

        th, td {
            padding: 8px;
            text-align: left;
        }

        th {
            background-color: #f4f4f4;
        }
    </style>
</head>

<body>
    <h1>Luna Tracker Analyzer</h1>
    <p>Paste your JSON data below or upload a JSON file and click "Analyze" to see the results:</p>
    <textarea id="jsonInput" placeholder="Enter JSON here..."></textarea>
    <br>
    <input type="file" id="jsonFile" accept=".json">
    <br>
    <button onclick="analyzeJson()">Analyze</button>

    <h2>Formatted Text</h2>
    <div id="formattedText"></div>

    <h2>Chart: Breastfeeding Occurrences per Day</h2>
    <canvas id="breastfeedingChart"></canvas>

    <h2>Chart: Breastfeeding Occurrences per Hour</h2>
    <canvas id="breastfeedingTimesChart"></canvas>

    <h2>Other Data (Table)</h2>
    <table id="dataTable">
        <thead>
            <tr>
                <th>Time</th>
                <th>Type</th>
                <th>Signature</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script src="script.js"></script>
</body>

</html>
